version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: adam_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adam_protocol
    ports:
      - '5432:5432'
    volumes:
      - adam_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: adam_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - adam_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Uncomment to run the backend in Docker too
  # backend:
  #   build: .
  #   container_name: adam_backend
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@postgres:5432/adam_protocol
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #   ports:
  #     - '4000:4000'
  #   volumes:
  #     - .:/app
  #     - /app/node_modules

volumes:
  adam_postgres_data:
  adam_redis_data:
